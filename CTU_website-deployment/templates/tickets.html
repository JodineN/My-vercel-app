<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Internal Management Portal - CTU</title>
    <link rel="stylesheet" href="/static/css/tickets.style.css">
</head>
<body>
    <nav class="navbar">
    <div class="container">
        <div class="logo">
            <a href="#hero" id="hero"><img src="/static/assets/ctulogo2.png" alt="logo"></a>
            <form action="/logout" method="GET">
                <button type="submit">Logout</button>
            </form>
        </div>

        <div class="crm-header">
        <h1>CTU Portal Operations Centre</h1>
        <p>Logged in Server Instance: <strong>CRM Master Console</strong></p>
    </div>

    <div class="ticket-grid">
        
        <div class="ticket-card-panel">
            <h2>Active Support Tickets</h2>
            <div class="ticket-list-container">
                {% for ticket in tickets %}
                <div class="ticket-item" data-id="{{ ticket[0] }}">
                    <span class="status-badge status-new">
                        {{ ticket[4] }}
                    </span>

                    <strong class="client-title">
                        Inquiry from: {{ ticket[1] }}
                    </strong>

                    <span class="subject-meta">
                        Subject: {{ ticket[3] }}
                    </span>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="ticket-detail-panel">
            

        </div>

    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const firstID = {{ first_ticket_id | tojson}};

            if(firstID){
                loadTicket(firstID);
            }
        });

        document.querySelectorAll(".ticket-item").forEach(item => {
            item.addEventListener("click", () => {
                const id = item.dataset.id;
                loadTicket(id);
            });
        });

        function loadTicket(id) {
        fetch(`dashboard/${id}`)
            .then(res => res.json())
            .then(data => {

                let commentsHTML = "";

                data.comments.forEach(c => {
                    commentsHTML += `
                        <div class="comment-box">
                            <strong>Agent:</strong> ${c.text}
                            <small>${c.created_at}</small>
                        </div>
                    `;
                });

                document.querySelector(".ticket-detail-panel").innerHTML = `
                    <h2>Ticket Workspace (#${data.id})</h2>
                    <hr class="panel-divider">

                    <p><strong>Client Name:</strong> ${data.name}</p>
                    <p><strong>Client Contact:</strong> ${data.email}</p>

                    <p><strong>Issue Description:</strong></p>
                    <div class="description-well">
                        ${data.message}
                    </div>

                    <form method="POST" action="tickets/${data.id}/update" class="status-form">
                        <label for="status" class="form-label">Modify Operational Status:</label>
                        <div class="input-group">
                            <select name="status" class="form-select">
                                <option ${data.status === "New" ? "selected" : ""}>New</option>
                                <option ${data.status === "Assigned" ? "selected" : ""}>Assigned</option>
                                <option ${data.status === "In Progress" ? "selected" : ""}>In Progress</option>
                                <option ${data.status === "Resolved" ? "selected" : ""}>Resolved</option>
                            </select>
                            <button type="submit" class="btn-primary">Update</button>
                        </div>
                    </form>

                    <h3>Ticket Activity Feed</h3>
                    <div class="comments-feed-history">
                        ${commentsHTML}
                    </div>

                    <form method="POST" action="tickets/${data.id}/comment">
                        <textarea name="comment" class="form-control form-textarea" placeholder="Add comment..."></textarea>
                        <button type="submit" class="btn">Submit Comment</button>
                    </form>
                `;
            });
        }
    </script>
</body>
</html>
