events { 
    worker_connections 1024; 
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Define the backend application node
    upstream ctu_backend {
        server webapp1:3001;
        server webapp2:3001;
    }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        # Fixed SSL file names matching the generated keys
        ssl_certificate         /etc/nginx/certs/serverkey.crt;
        ssl_certificate_key     /etc/nginx/certs/serverkey.key;

        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             HIGH:!aNULL:!MD5;

        # Redirect root visitors directly to the login page first
        location = / {
            return 302 /login;
        }

        # Direct all other traffic to the unified load-balanced cluster
        location / {
            proxy_pass http://ctu_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}